name: loveaxis_app
description: "LoveAxis - A premium luxury dating app."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  video_player: ^2.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/best_photo_illustration.png
    - assets/images/verification_illustration.png
    - assets/images/profiles/
    - assets/images/onboarding/
    - lib/assets/images/
    - assets/icons/
    - assets/animations/
    - lib/assets/images/backgrounds/1.jpg
    - lib/assets/images/backgrounds/2.jpg
    - lib/assets/images/backgrounds/3.jpg
    - lib/assets/images/backgrounds/welcome_bg.png
    - lib/assets/videos/bumble.mp4
